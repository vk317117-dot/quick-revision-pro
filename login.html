<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Revision Login</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
width:340px;
background:#1e293b;
padding:25px;
border-radius:18px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
text-align:center;
color:#60a5fa;
}

input{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h1>Quick Revision</h1>

<p style="text-align:center;">
India's Smart Practice Platform
</p>

<input type="text" id="name" placeholder="Enter Your Name">

<button onclick="startTest()">
Start Test
</button>

</div>

<script>

function startTest(){

const name=document.getElementById("name").value.trim();

if(name===""){

alert("Please Enter Your Name");

return;

}

localStorage.setItem("studentName",name);

window.location.href="index.html";

}

</script>

</body>
</html>
