<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Revision Student</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f7fb;color:#111}
header{background:#0b57d0;color:white;padding:20px;text-align:center}
.card{background:white;margin:18px;padding:20px;border-radius:16px;box-shadow:0 4px 12px #ddd}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.btn{padding:25px;border:2px solid #0b57d0;border-radius:16px;background:white;color:#0b57d0;font-size:22px;font-weight:bold;cursor:pointer}
footer{text-align:center;padding:20px;font-weight:bold;color:#555}
</style>
</head>
<body>

<header>
<h1>QUICK REVISION</h1>
<p>India's Smart Practice Platform</p>
</header>

<div class="card">
<h2 id="welcome">Welcome Student</h2>
<p>Select your exam category</p>

<div class="grid">
<button class="btn">Railway</button>
<button class="btn">SSC</button>
<button class="btn">Banking</button>
<button class="btn">BPSC</button>
<button class="btn">Bihar Police</button>
<button class="btn">Bihar Teacher</button>
<button class="btn">Bihar Daroga</button>
<button class="btn">Other Exams</button>
</div>
</div>

<div class="card">
<h2>Available Test Series</h2>
<div class="grid">
<button class="btn">Mock Test</button>
<button class="btn">PYQ Test</button>
<button class="btn">Topic Test</button>
<button class="btn">Daily Quiz</button>
</div>
</div>

<footer>
Developed By Vicky Kumar | India's Smart Practice Platform
</footer>

<script>
const name=localStorage.getItem("studentName");
if(name){
document.getElementById("welcome").innerText="Welcome, "+name;
}
</script>

</body>
</html>
